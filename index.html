<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baza Kart Charakterystyki ENPROM</title>
    <style>
        :root {
            --primary: #0078d4;
            --danger: #d13438;
            --bg: #f3f2f1;
            --text: #323130;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .app-container { width: 100%; max-width: 550px; background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); box-sizing: border-box; }
        
        .emergency-btn { background: var(--danger); color: white; text-decoration: none; display: flex; align-items: center; justify-content: center; padding: 12px; border-radius: 8px; font-weight: bold; font-size: 16px; margin-bottom: 15px; border: 2px solid #a4262c; }
        .search-box { width: 100%; box-sizing: border-box; padding: 12px; margin-bottom: 15px; border: 2px solid var(--primary); border-radius: 8px; font-size: 15px; outline: none; }
        
        /* Karta produktu - mniejsza i bez interakcji kliknięcia */
        .product-card { background: #fff; border: 1px solid #edebe9; border-radius: 8px; margin-bottom: 12px; padding: 10px; }
        .product-title { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 8px; display: block; border-bottom: 1px solid #f3f2f1; padding-bottom: 5px; }
        
        /* Kontener na przyciski - zawsze widoczny */
        .lang-grid { display: flex; gap: 8px; }

        .btn-lang { 
            flex: 1; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 8px 4px; 
            text-decoration: none; 
            color: var(--text); 
            border: 1px solid #ddd; 
            border-radius: 6px; 
            background: #faf9f8;
            transition: all 0.2s;
        }
        .btn-lang:active { background: #eee; transform: scale(0.98); }
        
        .flag { font-size: 18px; margin-right: 6px; }
        .btn-label { font-size: 12px; font-weight: 600; }
        
        .ufi-info { font-size: 9px; color: #605e5c; margin-top: 8px; font-family: monospace; line-height: 1.2; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="app-container">
        <a href="tel:112" class="emergency-btn">🆘 RATOWNICTWO: 112</a>

        <input type="text" id="search" class="search-box" placeholder="Szukaj produktu lub UFI...">

        <div id="product-list">
            
            <div class="product-card">
                <span class="product-title">1. Olej napędowy (ON) / Diesel - ORLEN</span>
                <div class="lang-grid">
                    <a href="https://enprom365.sharepoint.com/:b:/s/M365_Ochronarodowiska/IQAkuT3PIebERJqxqZaBgMAwAZSWfYQKqdbbfdGSMLqkUcM?e=QJCfR5" class="btn-lang" target="_blank">
                        <span class="flag">🇵🇱</span>
                        <span class="btn-label">PL (Pobierz)</span>
                    </a>
                    <a href="LINK_DO_DE_SHAREPOINT" class="btn-lang" target="_blank">
                        <span class="flag">🇩🇪</span>
                        <span class="btn-label">DE (SDB)</span>
                    </a>
                </div>
                <div class="ufi-info">
                    UFI: A830-6020-C002-Y1UR / JS30-706D-6001-X3C4
                </div>
            </div>

            </div>
    </div>

    <script>
        document.getElementById('search').addEventListener('input', function(e) {
            let filter = e.target.value.toLowerCase();
            let cards = document.querySelectorAll('.product-card');
            cards.forEach(card => {
                let text = card.textContent.toLowerCase();
                if (text.includes(filter)) {
                    card.classList.remove('hidden');
                } else {
                    card.classList.add('hidden');
                }
            });
        });
    </script>

</body>
</html>
